name: Assign User Roles

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to assign roles"
        required: true
        default: "dev"
        type: choice
        options: [dev, test]
      action:
        description: "Action to perform"
        required: true
        default: "list"
        type: choice
        options: [list, assign-all]

env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

jobs:
  assign-roles:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Assign Roles
        run: |
          # Get app details
          APP_NAME="tc-swa-${{ github.event.inputs.environment }}-auth"
          APP_ID=$(az ad app list --display-name "$APP_NAME" --query "[0].appId" -o tsv)
          SP_ID=$(az ad sp list --display-name "$APP_NAME" --query "[0].id" -o tsv)
          
          # Validate app exists
          if [ -z "$APP_ID" ]; then
            echo "❌ ERROR: Azure AD app '$APP_NAME' not found!"
            echo "Available apps:"
            az ad app list --query "[].displayName" --output tsv | grep swa | sed 's/^/  - /'
            exit 1
          fi
          
          if [ -z "$SP_ID" ]; then
            echo "❌ ERROR: Service Principal for '$APP_NAME' not found!"
            echo "Creating service principal..."
            az ad sp create --id $APP_ID
            SP_ID=$(az ad sp list --display-name "$APP_NAME" --query "[0].id" -o tsv)
          fi
          
          echo "=== Azure AD App: $APP_NAME ==="
          echo "App ID: $APP_ID"
          echo "Service Principal ID: $SP_ID"
          
          if [ "${{ github.event.inputs.action }}" = "list" ]; then
            echo "=== Current Role Assignments ==="
            az ad app role assignment list --filter "resourceId eq '$SP_ID'" --output table
          fi
          
          if [ "${{ github.event.inputs.action }}" = "assign-all" ]; then
            echo "=== Assigning roles from users.json ==="
            
            # Read users.json and assign roles
            USER_EMAILS=$(jq -r '.userAssignments | keys[]' scripts/users.json)
            
            for EMAIL in $USER_EMAILS; do
              echo "Processing user: $EMAIL"
              
              # Check if user exists
              USER_ID=$(az ad user show --id "$EMAIL" --query "id" -o tsv 2>/dev/null)
              
              if [ -n "$USER_ID" ]; then
                echo "  ✓ User found: $EMAIL"
                
                # Get roles for this user
                ROLES=$(jq -r ".userAssignments[\"$EMAIL\"][]" scripts/users.json)
                
                for ROLE in $ROLES; do
                  echo "  Assigning role: $ROLE"
                  ROLE_ID=$(az ad app list --display-name "$APP_NAME" --query "[0].appRoles[?displayName=='$ROLE'].id" -o tsv)
                  
                  if [ -n "$ROLE_ID" ]; then
                    # Check if role already assigned
                    EXISTING=$(az ad app role assignment list --assignee $USER_ID --filter "resourceId eq '$SP_ID'" --query "[?id=='$ROLE_ID']" --output tsv)
                    
                    if [ -z "$EXISTING" ]; then
                      az ad app role assignment create --assignee $USER_ID --role $ROLE_ID --resource-id $SP_ID --only-show-errors
                      echo "    ✓ Assigned $ROLE to $EMAIL"
                    else
                      echo "    ⚠ $ROLE already assigned to $EMAIL"
                    fi
                  else
                    echo "    ✗ Role not found: $ROLE"
                    echo "    Available roles:"
                    az ad app list --display-name "$APP_NAME" --query "[0].appRoles[].displayName" --output tsv | sed 's/^/      - /'
                  fi
                done
              else
                echo "  ✗ User not found: $EMAIL"
                echo "    Skipping this user - they don't exist in Azure AD"
                echo "    Available users in tenant:"
                az ad user list --query "[].userPrincipalName" --output tsv | head -5 | sed 's/^/      - /'
              fi
              echo ""
            done
          fi
