name: Assign SWA User Roles

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (dev, test)"
        required: true
        default: "dev"
        type: choice
        options: [dev, test]
      action:
        description: "Action to perform"
        required: true
        default: "assign-all"
        type: choice
        options: [list, assign-all]

env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

jobs:
  assign-roles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Environment Variables
        run: |
          if [ "${{ github.event.inputs.environment }}" = "dev" ]; then
            echo "SWA_NAME=tc-swa-dev" >> $GITHUB_ENV
            echo "SWA_RG=tc-swa-dev-rg" >> $GITHUB_ENV
            echo "SWA_DOMAIN=blue-smoke-087c3fd0f.6.azurestaticapps.net" >> $GITHUB_ENV
          else
            echo "SWA_NAME=tc-swa-test" >> $GITHUB_ENV
            echo "SWA_RG=tc-swa-test-rg" >> $GITHUB_ENV
            echo "SWA_DOMAIN=YOUR-TEST-SWA-DOMAIN.azurestaticapps.net" >> $GITHUB_ENV
          fi

      - name: Install staticwebapp Azure CLI extension
        run: az extension add --name staticwebapp --yes

      - name: Assign / List SWA Roles
        run: |
          CSV_FILE="invite-links.csv"

          # ── Fetch all existing SWA users upfront ──────────────────────────────
          echo "=== Fetching existing SWA users ==="
          SWA_USERS=$(az staticwebapp users list \
            --name "$SWA_NAME" \
            --resource-group "$SWA_RG" \
            -o json) || SWA_USERS="[]"

          echo "Found $(echo "$SWA_USERS" | jq length) existing SWA users:"
          echo "Raw JSON:" 
          echo "$SWA_USERS" | jq '.[0]'
          echo "$SWA_USERS" | jq -r '.[].properties | "  - \(.userDetails) (id: \(.userId), roles: \(.roles))"'

          # ── LIST mode ──────────────────────────────────────────────────────────
          if [ "${{ github.event.inputs.action }}" = "list" ]; then
            echo ""
            echo "$SWA_USERS" | jq -r '.[].properties | "\(.userDetails)\t\(.roles)"'
            exit 0
          fi

          # ── ASSIGN-ALL mode ────────────────────────────────────────────────────
          echo "email,roles,status,invite_link" > $CSV_FILE
          echo ""
          echo "=== Assigning roles from users.json ==="

          USER_EMAILS=$(jq -r '.userAssignments | keys[]' scripts/users.json)

          for EMAIL in $USER_EMAILS; do
            echo ""
            echo "Processing: $EMAIL"
            ROLES=$(jq -r ".userAssignments[\"$EMAIL\"] | join(\",\")" scripts/users.json)
            echo "  Target roles: $ROLES"

            # Search for this user in existing SWA users (by userDetails match)
            SWA_USER_ID=$(echo "$SWA_USERS" | jq -r \
              "[.[] | select(.properties.userDetails == \"$EMAIL\")] | .[0].name // empty") || true

            if [ -n "$SWA_USER_ID" ]; then
              # ── Existing user found → update roles directly (no invite!) ──────
              echo "  ✓ Found existing SWA user (id: $SWA_USER_ID)"
              echo "  Updating roles to: $ROLES"
              az staticwebapp users update \
                --name "$SWA_NAME" \
                --resource-group "$SWA_RG" \
                --authentication-provider aad \
                --user-id "$SWA_USER_ID" \
                --roles "$ROLES" \
                --only-show-errors
              echo "  ✓ Roles updated — no invite needed"
              echo "$EMAIL,\"$ROLES\",roles_updated," >> $CSV_FILE

            else
              # ── New user → generate one-time invite link ──────────────────────
              echo "  ℹ User not in SWA yet — generating one-time invite link..."
              set +e
              INVITE_OUTPUT=$(az staticwebapp users invite \
                --name "$SWA_NAME" \
                --resource-group "$SWA_RG" \
                --authentication-provider aad \
                --user-details "$EMAIL" \
                --role "$ROLES" \
                --invitation-expiration-in-hours 168 \
                --domain "$SWA_DOMAIN" 2>&1)
              INVITE_RC=$?
              set -e

              if [ $INVITE_RC -eq 0 ]; then
                INVITE=$(echo "$INVITE_OUTPUT" | jq -r '.invitationUrl // empty' 2>/dev/null) || true
                if [ -n "$INVITE" ]; then
                  echo "  ✓ Invite link generated (one-time only, expires in 7 days)"
                  echo "$EMAIL,\"$ROLES\",invite_generated,$INVITE" >> $CSV_FILE
                else
                  echo "  ✗ Could not extract invite URL"
                  echo "$EMAIL,\"$ROLES\",failed," >> $CSV_FILE
                fi
              else
                echo "  ✗ Failed to generate invite"
                echo "  Error: $INVITE_OUTPUT"
                echo "$EMAIL,\"$ROLES\",failed," >> $CSV_FILE
              fi
            fi
          done

          echo ""
          echo "=== Summary CSV ==="
          cat $CSV_FILE

      - name: Upload invite CSV as artifact
        if: ${{ github.event.inputs.action == 'assign-all' }}
        uses: actions/upload-artifact@v4
        with:
          name: invite-links-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: invite-links.csv
          retention-days: 3
