name: Assign SWA User Roles

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (dev, test)"
        required: true
        default: "dev"
        type: choice
        options: [dev, test]
      action:
        description: "Action to perform"
        required: true
        default: "assign-all"
        type: choice
        options: [list, assign-all]

env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

jobs:
  assign-roles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Environment Variables
        run: |
          if [ "${{ github.event.inputs.environment }}" = "dev" ]; then
            echo "SWA_NAME=tc-swa-dev" >> $GITHUB_ENV
            echo "SWA_RG=tc-swa-dev-rg" >> $GITHUB_ENV
            echo "SWA_DOMAIN=blue-smoke-087c3fd0f.6.azurestaticapps.net" >> $GITHUB_ENV
          else
            echo "SWA_NAME=tc-swa-test" >> $GITHUB_ENV
            echo "SWA_RG=tc-swa-test-rg" >> $GITHUB_ENV
            echo "SWA_DOMAIN=YOUR-TEST-SWA-DOMAIN.azurestaticapps.net" >> $GITHUB_ENV
          fi
          echo "SUB_ID=${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}" >> $GITHUB_ENV

      - name: Assign / List SWA Roles
        run: |
          BASE_URL="https://management.azure.com/subscriptions/$SUB_ID/resourceGroups/$SWA_RG/providers/Microsoft.Web/staticSites/$SWA_NAME"
          API_VER="?api-version=2022-03-01"
          CSV_FILE="invite-links.csv"

          # ── LIST mode ──────────────────────────────────────────────────────────
          if [ "${{ github.event.inputs.action }}" = "list" ]; then
            echo "=== Current SWA Role Assignments ==="
            az rest --method GET \
              --url "${BASE_URL}/users${API_VER}" \
              --query "value[].{Email:properties.userDetails, Roles:properties.roles, Provider:properties.provider}" \
              -o table
            exit 0
          fi

          # ── ASSIGN-ALL mode ────────────────────────────────────────────────────
          echo "email,roles,status,invite_link" > $CSV_FILE

          echo "=== Assigning roles from users.json ==="

          USER_EMAILS=$(jq -r '.userAssignments | keys[]' scripts/users.json)

          for EMAIL in $USER_EMAILS; do
            echo ""
            echo "Processing: $EMAIL"
            ROLES=$(jq -r ".userAssignments[\"$EMAIL\"] | join(\",\")" scripts/users.json)
            echo "  Target roles: $ROLES"

            # Check if user already exists in SWA
            SWA_USER=$(az rest --method GET \
              --url "${BASE_URL}/users${API_VER}" \
              --query "value[?properties.userDetails=='$EMAIL'] | [0]" \
              -o json 2>/dev/null) || true

            SWA_USER_ID=$(echo "$SWA_USER" | jq -r '.name // empty' 2>/dev/null) || true
            SWA_PROVIDER=$(echo "$SWA_USER" | jq -r '.properties.provider // empty' 2>/dev/null) || true

            if [ -n "$SWA_USER_ID" ] && [ -n "$SWA_PROVIDER" ]; then
              # Existing user — update roles directly
              echo "  ✓ Existing user — updating roles to: $ROLES"
              az rest --method PUT \
                --url "${BASE_URL}/authproviders/$SWA_PROVIDER/users/$SWA_USER_ID${API_VER}" \
                --body "{\"properties\": {\"roles\": \"$ROLES\"}}" \
                --only-show-errors
              echo "$EMAIL,\"$ROLES\",roles_updated," >> $CSV_FILE
              echo "  ✓ Done"

            else
              # New user — generate invite link
              echo "  ℹ New user — generating invite link..."
              INVITE=$(az rest --method POST \
                --url "${BASE_URL}/createUserRolesInvitationLink${API_VER}" \
                --body "{
                  \"properties\": {
                    \"domain\": \"$SWA_DOMAIN\",
                    \"provider\": \"aad\",
                    \"userDetails\": \"$EMAIL\",
                    \"roles\": \"$ROLES\",
                    \"numHoursToExpiration\": 168
                  }
                }" \
                --query "properties.invitationUrl" \
                -o tsv) || true

              if [ -n "$INVITE" ]; then
                echo "$EMAIL,$ROLES,invite_generated,$INVITE" >> $CSV_FILE
                echo "  ✓ Invite link generated"
              else
                echo "$EMAIL,$ROLES,failed," >> $CSV_FILE
                echo "  ✗ Failed to generate invite"
              fi
            fi
          done

          echo ""
          echo "=== Summary CSV ==="
          cat $CSV_FILE

      - name: Upload invite CSV as artifact
        if: ${{ github.event.inputs.action == 'assign-all' }}
        uses: actions/upload-artifact@v4
        with:
          name: invite-links-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: invite-links.csv
          retention-days: 3
