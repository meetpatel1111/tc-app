name: Assign User Roles

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to assign roles"
        required: true
        default: "dev"
        type: choice
        options: [dev, test]
      action:
        description: "Action to perform"
        required: true
        default: "list"
        type: choice
        options: [list, assign-all]

env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

jobs:
  assign-roles:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Assign Roles
        run: |
          # Get app details
          APP_NAME="${{ github.event.inputs.environment }}-swa-auth"
          APP_ID=$(az ad app list --display-name "$APP_NAME" --query "[0].appId" -o tsv)
          SP_ID=$(az ad sp list --display-name "$APP_NAME" --query "[0].id" -o tsv)
          
          echo "=== Azure AD App: $APP_NAME ==="
          echo "App ID: $APP_ID"
          echo "Service Principal ID: $SP_ID"
          
          if [ "${{ github.event.inputs.action }}" = "list" ]; then
            echo "=== Current Role Assignments ==="
            az ad app role assignment list --filter "resourceId eq '$SP_ID'" --output table
          fi
          
          if [ "${{ github.event.inputs.action }}" = "assign-all" ]; then
            echo "=== Assigning roles from users.json ==="
            
            # Read users.json and assign roles
            USER_EMAILS=$(jq -r '.userAssignments | keys[]' scripts/users.json)
            
            for EMAIL in $USER_EMAILS; do
              echo "Processing user: $EMAIL"
              USER_ID=$(az ad user show --id "$EMAIL" --query "id" -o tsv)
              
              if [ -n "$USER_ID" ]; then
                # Get roles for this user
                ROLES=$(jq -r ".userAssignments[\"$EMAIL\"][]" scripts/users.json)
                
                for ROLE in $ROLES; do
                  echo "  Assigning role: $ROLE"
                  ROLE_ID=$(az ad app list --display-name "$APP_NAME" --query "[0].appRoles[?displayName=='$ROLE'].id" -o tsv)
                  
                  if [ -n "$ROLE_ID" ]; then
                    az ad app role assignment create --assignee $USER_ID --role-definition-id $ROLE_ID --resource $SP_ID --only-show-errors
                    echo "    ✓ Assigned $ROLE to $EMAIL"
                  else
                    echo "    ✗ Role not found: $ROLE"
                  fi
                done
              else
                echo "  ✗ User not found: $EMAIL"
              fi
            done
          fi
